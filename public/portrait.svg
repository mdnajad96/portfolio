<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 760" role="img" aria-label="Portrait placeholder of Muhammad Munajad">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef3fb"/>
      <stop offset="0.55" stop-color="#e2eafc"/>
      <stop offset="1" stop-color="#dbe6fb"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d384d"/>
      <stop offset="1" stop-color="#1d2533"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="36%" r="42%">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#9db3d6" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="640" height="760" fill="url(#bg)"/>
  <rect width="640" height="760" fill="url(#grid)"/>
  <rect width="640" height="760" fill="url(#halo)"/>

  <!-- Technical accent circles -->
  <circle cx="320" cy="300" r="190" fill="none" stroke="#2563eb" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="320" cy="300" r="150" fill="none" stroke="#2563eb" stroke-opacity="0.12" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- Stylized figure -->
  <g transform="translate(0,40)">
    <circle cx="320" cy="250" r="96" fill="url(#figure)"/>
    <path d="M170 560c0-95 67-168 150-168s150 73 150 168z" fill="url(#figure)"/>
  </g>

  <!-- Monogram badge -->
  <g transform="translate(320,300)">
    <circle r="54" fill="#ffffff" fill-opacity="0.92"/>
    <text x="0" y="18" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="52" font-weight="700" fill="#1d2533">MM</text>
  </g>

  <!-- Caption -->
  <text x="320" y="690" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="30" font-weight="700" fill="#1d2533">Muhammad Munajad</text>
  <text x="320" y="722" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" letter-spacing="1.5" fill="#435c82">MECHANICAL · MANUFACTURING · RESEARCH</text>
</svg>
